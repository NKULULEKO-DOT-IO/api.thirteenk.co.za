name: ThirteenK API CI/CD

on:
  push:
    branches: [ master, uat ]
  pull_request:
    branches: [ master, uat ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: thirteenkapi
  REGION: ${{ secrets.GCP_REGION }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set environment variables based on branch
      run: |
        if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
          echo "ENVIRONMENT=production" >> $GITHUB_ENV
          echo "SERVICE_SUFFIX=" >> $GITHUB_ENV
          echo "DEBUG=False" >> $GITHUB_ENV
          echo "MONGODB_URL=${{ secrets.MONGODB_URL_PROD }}" >> $GITHUB_ENV
        else
          echo "ENVIRONMENT=uat" >> $GITHUB_ENV
          echo "SERVICE_SUFFIX=-uat" >> $GITHUB_ENV
          echo "DEBUG=True" >> $GITHUB_ENV
          echo "MONGODB_URL=${{ secrets.MONGODB_URL_UAT }}" >> $GITHUB_ENV
        fi

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v0
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        export_default_credentials: true

    - name: Authorize Docker push
      run: gcloud auth configure-docker

    - name: Create build environment file
      run: |
        echo "API_VERSION=${{ secrets.API_VERSION }}" > .env.build
        echo "API_PREFIX=/api/\${API_VERSION}" >> .env.build
        echo "DEBUG=${DEBUG}" >> .env.build
        echo "PROJECT_NAME=THIRTEENK Image Platform" >> .env.build
        echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.build
        echo "MONGODB_URL=${MONGODB_URL}" >> .env.build
        echo "MONGODB_DB_NAME=thirteenk" >> .env.build
        echo "GCS_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" >> .env.build
        echo "GCS_CREDENTIALS_JSON=${{ secrets.GCS_CREDENTIALS_JSON }}" >> .env.build
        echo "GCS_ORIGINAL_BUCKET=${{ secrets.GCS_ORIGINAL_BUCKET }}" >> .env.build
        echo "GCS_THUMBNAIL_BUCKET=${{ secrets.GCS_THUMBNAIL_BUCKET }}" >> .env.build
        echo "LOG_LEVEL=INFO" >> .env.build
        echo "PORT=8000" >> .env.build

    - name: Create GCS credentials directory
      run: mkdir -p secrets

    - name: Save GCS credentials as file
      run: echo '${{ secrets.GCS_CREDENTIALS_JSON }}' > secrets/gcs-credentials.json

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}${{ env.SERVICE_SUFFIX }}:${{ github.sha }}
          gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}${{ env.SERVICE_SUFFIX }}:latest

    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v0
      with:
        service: ${{ env.SERVICE_NAME }}${{ env.SERVICE_SUFFIX }}
        image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}${{ env.SERVICE_SUFFIX }}:latest
        region: ${{ env.REGION }}
        flags: --allow-unauthenticated --port=8000
        env_vars: |
          API_VERSION=${{ secrets.API_VERSION }}
          API_PREFIX=/api/${API_VERSION}
          DEBUG=${{ env.DEBUG }}
          PROJECT_NAME=THIRTEENK Image Platform
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          MONGODB_URL=${{ env.MONGODB_URL }}
          MONGODB_DB_NAME=thirteenk
          GCS_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
          GCS_CREDENTIALS_JSON=${{ secrets.GCS_CREDENTIALS_JSON }}
          GCS_ORIGINAL_BUCKET=${{ secrets.GCS_ORIGINAL_BUCKET }}
          GCS_THUMBNAIL_BUCKET=${{ secrets.GCS_THUMBNAIL_BUCKET }}
          LOG_LEVEL=INFO

    - name: Test deployment
      run: |
        DEPLOY_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }}${{ env.SERVICE_SUFFIX }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
        if curl -f -s -o /dev/null "$DEPLOY_URL"; then
          echo "Deployment verified successfully at $DEPLOY_URL"
        else
          echo "Deployment verification failed"
          exit 1
        fi